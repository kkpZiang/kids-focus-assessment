<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>儿童学习专注力评测 · FocusMap™</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #faf8f3;
    --surface: #ffffff;
    --surface2: #f4f1ea;
    --ink: #1a1714;
    --ink2: #5c5650;
    --ink3: #9c9590;
    --accent: #d4630a;
    --accent2: #e8a265;
    --accent-soft: #fdf0e6;
    --teal: #0f7d65;
    --teal-soft: #e4f5f0;
    --blue: #1b5fa8;
    --blue-soft: #e8f1fb;
    --red: #c0392b;
    --red-soft: #fcecea;
    --gold: #b5860d;
    --gold-soft: #fef8e6;
    --border: rgba(26,23,20,0.1);
    --radius: 12px;
    --shadow: 0 2px 20px rgba(26,23,20,0.06);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans SC', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    line-height: 1.7;
  }

  /* ——— HEADER ——— */
  .site-header {
    background: var(--ink);
    color: #fff;
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    font-family: 'Noto Serif SC', serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.02em;
  }
  .logo span { color: var(--accent2); }
  .header-badge {
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* ——— HERO ——— */
  .hero {
    background: linear-gradient(135deg, #1a1714 0%, #2d2520 60%, #3a2d1e 100%);
    color: #fff;
    padding: 4rem 2rem 3rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 70% 30%, rgba(212,99,10,0.15) 0%, transparent 60%);
    pointer-events: none;
  }
  .hero-tag {
    display: inline-block;
    background: rgba(212,99,10,0.25);
    color: var(--accent2);
    border: 1px solid rgba(212,99,10,0.4);
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 4px 14px;
    border-radius: 100px;
    margin-bottom: 1.5rem;
  }
  .hero h1 {
    font-family: 'Noto Serif SC', serif;
    font-size: clamp(1.8rem, 5vw, 3rem);
    font-weight: 700;
    line-height: 1.3;
    margin-bottom: 1rem;
  }
  .hero h1 em {
    font-style: normal;
    color: var(--accent2);
  }
  .hero p {
    color: rgba(255,255,255,0.65);
    font-size: 15px;
    max-width: 540px;
    margin: 0 auto 2rem;
  }
  .hero-meta {
    display: flex;
    justify-content: center;
    gap: 2rem;
    flex-wrap: wrap;
  }
  .hero-meta-item {
    text-align: center;
  }
  .hero-meta-item strong {
    display: block;
    font-size: 22px;
    font-weight: 700;
    color: var(--accent2);
  }
  .hero-meta-item span {
    font-size: 12px;
    color: rgba(255,255,255,0.5);
  }

  /* ——— PROGRESS ——— */
  .progress-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 1rem 2rem;
    position: sticky;
    top: 56px;
    z-index: 90;
    display: flex;
    align-items: center;
    gap: 1rem;
  }
  .progress-track {
    flex: 1;
    height: 4px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--teal), var(--accent));
    border-radius: 2px;
    transition: width 0.4s ease;
    width: 0%;
  }
  .progress-text {
    font-size: 12px;
    color: var(--ink3);
    white-space: nowrap;
    min-width: 60px;
    text-align: right;
  }
  .progress-icon {
    font-size: 18px;
  }

  /* ——— MAIN LAYOUT ——— */
  .main {
    max-width: 760px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
  }

  /* ——— SECTION HEADER ——— */
  .section-intro {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.5rem;
    margin-bottom: 1.5rem;
    display: flex;
    gap: 1rem;
    align-items: flex-start;
  }
  .section-icon {
    width: 44px;
    height: 44px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }
  .section-intro h2 {
    font-family: 'Noto Serif SC', serif;
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .section-intro p {
    font-size: 13px;
    color: var(--ink2);
    line-height: 1.6;
  }

  /* ——— QUESTION CARD ——— */
  .question-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.5rem;
    margin-bottom: 1rem;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .question-card:hover {
    border-color: rgba(26,23,20,0.18);
    box-shadow: var(--shadow);
  }
  .question-card.answered {
    border-color: rgba(15,125,101,0.3);
    background: linear-gradient(135deg, #ffffff 0%, #f7fdfa 100%);
  }
  .question-number {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink3);
    margin-bottom: 6px;
  }
  .question-text {
    font-size: 15px;
    font-weight: 500;
    color: var(--ink);
    margin-bottom: 1rem;
    line-height: 1.6;
  }

  /* ——— OPTIONS ——— */
  .options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .options.five-col {
    grid-template-columns: repeat(5, 1fr);
  }
  .option-btn {
    background: var(--surface2);
    border: 1.5px solid transparent;
    border-radius: 8px;
    padding: 10px 8px;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s ease;
    font-size: 12px;
    color: var(--ink2);
    line-height: 1.4;
    font-family: 'Noto Sans SC', sans-serif;
  }
  .option-btn:hover {
    background: var(--accent-soft);
    border-color: var(--accent2);
    color: var(--ink);
  }
  .option-btn.selected {
    background: var(--teal-soft);
    border-color: var(--teal);
    color: var(--teal);
    font-weight: 500;
  }
  .option-btn .opt-score {
    display: block;
    font-size: 18px;
    margin-bottom: 4px;
  }

  /* ——— FREQUENCY SCALE ——— */
  .freq-scale {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
  }
  .freq-btn {
    border: 1.5px solid var(--border);
    background: var(--surface);
    border-radius: 8px;
    padding: 8px 4px;
    text-align: center;
    cursor: pointer;
    transition: all 0.15s;
    font-size: 11px;
    color: var(--ink3);
    font-family: 'Noto Sans SC', sans-serif;
  }
  .freq-btn .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    margin: 0 auto 5px;
    background: var(--border);
    transition: background 0.15s;
  }
  .freq-btn:hover { border-color: var(--accent2); }
  .freq-btn:hover .dot { background: var(--accent2); }
  .freq-btn.selected { border-color: var(--teal); background: var(--teal-soft); color: var(--teal); font-weight: 500; }
  .freq-btn.selected .dot { background: var(--teal); }
  .freq-label { display: flex; justify-content: space-between; font-size: 10px; color: var(--ink3); margin-top: 4px; padding: 0 2px; }

  /* ——— START BUTTON ——— */
  .start-btn, .submit-btn {
    display: block;
    width: 100%;
    background: var(--ink);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    padding: 16px;
    font-size: 15px;
    font-weight: 500;
    font-family: 'Noto Sans SC', sans-serif;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
    margin-top: 2rem;
    letter-spacing: 0.03em;
  }
  .start-btn:hover, .submit-btn:hover {
    background: var(--accent);
    transform: translateY(-1px);
  }
  .start-btn:disabled, .submit-btn:disabled {
    background: var(--ink3);
    cursor: not-allowed;
    transform: none;
  }

  /* ——— RESULT PAGE ——— */
  #result-page { display: none; }

  .result-hero {
    background: var(--ink);
    color: #fff;
    border-radius: var(--radius);
    padding: 2.5rem 2rem;
    text-align: center;
    margin-bottom: 1.5rem;
    position: relative;
    overflow: hidden;
  }
  .result-hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, rgba(212,99,10,0.2) 0%, transparent 70%);
  }
  .result-grade {
    font-size: 72px;
    font-weight: 900;
    font-family: 'Noto Serif SC', serif;
    line-height: 1;
    margin-bottom: 0.5rem;
    position: relative;
  }
  .result-label {
    font-size: 22px;
    font-weight: 600;
    position: relative;
    margin-bottom: 0.5rem;
  }
  .result-sub {
    font-size: 13px;
    color: rgba(255,255,255,0.55);
    position: relative;
  }
  .result-score-row {
    display: flex;
    justify-content: center;
    gap: 2.5rem;
    margin-top: 1.5rem;
    position: relative;
  }
  .score-stat { text-align: center; }
  .score-stat strong { display: block; font-size: 26px; font-weight: 700; }
  .score-stat span { font-size: 11px; color: rgba(255,255,255,0.5); }

  /* ——— DIMENSION BARS ——— */
  .dim-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem 1.5rem;
    margin-bottom: 1rem;
  }
  .dim-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .dim-name {
    font-size: 14px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .dim-score-num { font-size: 14px; color: var(--ink3); }
  .dim-bar-track {
    height: 8px;
    background: var(--surface2);
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 6px;
  }
  .dim-bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
    width: 0%;
  }
  .dim-desc { font-size: 12px; color: var(--ink3); line-height: 1.6; }

  /* ——— REPORT SECTIONS ——— */
  .report-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.5rem;
    margin-bottom: 1rem;
  }
  .report-section h3 {
    font-family: 'Noto Serif SC', serif;
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .report-section h3 .tag {
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 100px;
    letter-spacing: 0.1em;
  }
  .tag-blue { background: var(--blue-soft); color: var(--blue); }
  .tag-red { background: var(--red-soft); color: var(--red); }
  .tag-gold { background: var(--gold-soft); color: var(--gold); }
  .tag-teal { background: var(--teal-soft); color: var(--teal); }

  .insight-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .insight-item {
    background: var(--surface2);
    border-radius: 8px;
    padding: 1rem;
  }
  .insight-item .icon { font-size: 22px; margin-bottom: 6px; }
  .insight-item h4 { font-size: 13px; font-weight: 500; margin-bottom: 4px; }
  .insight-item p { font-size: 12px; color: var(--ink2); line-height: 1.6; }

  .strength-list, .suggest-list { list-style: none; }
  .strength-list li, .suggest-list li {
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
    display: flex;
    gap: 10px;
    align-items: flex-start;
    line-height: 1.6;
  }
  .strength-list li:last-child, .suggest-list li:last-child { border-bottom: none; }
  .strength-list li::before { content: '✦'; color: var(--teal); flex-shrink: 0; margin-top: 2px; }
  .suggest-list li::before { content: '→'; color: var(--accent); flex-shrink: 0; margin-top: 2px; }

  .type-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--accent-soft);
    border: 1px solid rgba(212,99,10,0.2);
    color: var(--accent);
    font-size: 13px;
    font-weight: 500;
    padding: 6px 14px;
    border-radius: 100px;
    margin-bottom: 1rem;
  }

  .radar-container {
    display: flex;
    justify-content: center;
    margin: 1rem 0;
  }

  .profile-type-card {
    background: linear-gradient(135deg, var(--ink) 0%, #2d2520 100%);
    color: #fff;
    border-radius: var(--radius);
    padding: 1.5rem;
    margin-bottom: 1rem;
    display: flex;
    gap: 1.25rem;
    align-items: flex-start;
  }
  .profile-emoji { font-size: 40px; flex-shrink: 0; }
  .profile-type-card h3 { font-family: 'Noto Serif SC', serif; font-size: 18px; font-weight: 700; margin-bottom: 6px; }
  .profile-type-card p { font-size: 13px; color: rgba(255,255,255,0.7); line-height: 1.7; }

  .action-card {
    border-left: 3px solid var(--accent);
    background: var(--accent-soft);
    border-radius: 0 var(--radius) var(--radius) 0;
    padding: 1rem 1.25rem;
    margin-bottom: 8px;
  }
  .action-card h4 { font-size: 14px; font-weight: 500; color: var(--accent); margin-bottom: 4px; }
  .action-card p { font-size: 13px; color: var(--ink2); line-height: 1.6; }

  .restart-btn {
    display: block;
    width: 100%;
    background: transparent;
    border: 1.5px solid var(--border);
    color: var(--ink2);
    border-radius: var(--radius);
    padding: 14px;
    font-size: 14px;
    font-family: 'Noto Sans SC', sans-serif;
    cursor: pointer;
    margin-top: 1rem;
    transition: all 0.2s;
  }
  .restart-btn:hover { border-color: var(--ink); color: var(--ink); }

  /* ——— INFO BOX ——— */
  .info-box {
    background: var(--blue-soft);
    border: 1px solid rgba(27,95,168,0.15);
    border-radius: var(--radius);
    padding: 1.25rem;
    margin-bottom: 1.5rem;
    font-size: 13px;
    color: #1a3a6b;
    line-height: 1.7;
  }
  .info-box strong { display: block; margin-bottom: 4px; font-size: 14px; }

  .answered-counter {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--teal-soft);
    border: 1px solid rgba(15,125,101,0.2);
    color: var(--teal);
    font-size: 13px;
    border-radius: 8px;
    padding: 8px 12px;
    margin-bottom: 1rem;
    font-weight: 500;
  }

  @media (max-width: 600px) {
    .options { grid-template-columns: 1fr; }
    .freq-scale { grid-template-columns: repeat(5, 1fr); }
    .insight-grid { grid-template-columns: 1fr; }
    .result-score-row { gap: 1.5rem; }
    .hero { padding: 3rem 1.5rem 2rem; }
  }
</style>
</head>

  // 内在动机 (5题)
  { dim:'motivation', rev:false, text:'孩子对感兴趣的科目，会主动延长学习时间或深入探索吗？', type:'freq', reverse:false },
  { dim:'motivation', rev:false, text:'孩子遇到难题时，通常会坚持尝试多久才选择放弃或求助？', type:'options', opts:[
    { label:'立刻放弃', val:1 }, { label:'几分钟内', val:2 },
    { label:'10-20分钟', val:3 }, { label:'20-30分钟', val:4 }, { label:'长时间坚持', val:5 }
  ]},

    { label:'每件小事都要', val:1 }, { label:'经常需要', val:2 },
    { label:'有时需要', val:3 }, { label:'偶尔需要', val:4 }, { label:'基本不需要', val:5 }

    { label:'第二天恢复', val:3 }, { label:'当天调整好', val:4 }, { label:'迅速振作', val:5 }
  ]}
];

const FREQ_LABELS = ['从不', '偶尔', '有时', '经常', '总是'];
const FREQ_VALS = [5, 4, 3, 2, 1]; // 正向题：从不=5（好）
const answers = {};

function buildQuiz() {
  const container = document.getElementById('questionsContainer');
  let dimSections = {};

  QUESTIONS.forEach((q, i) => {
    if (!dimSections[q.dim]) dimSections[q.dim] = [];
    dimSections[q.dim].push({ q, i });
  });

  let html = '';
  DIMENSIONS.forEach(dim => {
    const questions = dimSections[dim.id];
    if (!questions) return;
    html += `
      <div class="section-intro">
        <div class="section-icon" style="background:${dim.color}20">${dim.emoji}</div>
        <div>
          <h2>${dim.name}</h2>
          <p>${dim.desc}</p>
        </div>
      </div>
    `;
    questions.forEach(({ q, i }) => {
      html += buildQuestion(q, i);
    });
  });

  container.innerHTML = html;
}

function buildQuestion(q, i) {
  const qNum = `Q${(i+1).toString().padStart(2,'0')}`;
  let optHtml = '';
  if (q.type === 'options') {
    optHtml = `<div class="options five-col">`;
    q.opts.forEach((opt, j) => {
      optHtml += `<button class="option-btn" onclick="selectOpt(${i}, ${opt.val}, this)" data-q="${i}">
        <span class="opt-score">${['①','②','③','④','⑤'][j]}</span>
        ${opt.label}
      </button>`;
    });
    optHtml += `</div>`;
  } else {
    const isReverse = q.rev !== false;
    optHtml = `<div class="freq-scale">`;
    FREQ_LABELS.forEach((lbl, j) => {
      const val = isReverse ? FREQ_VALS[j] : (j+1);
      optHtml += `<button class="freq-btn" onclick="selectOpt(${i}, ${val}, this)" data-q="${i}">
        <div class="dot"></div>${lbl}
      </button>`;
    });
    optHtml += `</div>
    <div class="freq-label"><span>← 更好</span><span>更差 →</span></div>`;
  }

  return `
    <div class="question-card" id="qcard-${i}">
      <div class="question-number">${qNum} · ${DIMENSIONS.find(d=>d.id===QUESTIONS[i].dim)?.name}</div>
      <div class="question-text">${q.text}</div>
      ${optHtml}
    </div>
  `;
}

function selectOpt(qi, val, btn) {
  const card = document.getElementById(`qcard-${qi}`);
  card.querySelectorAll('.option-btn, .freq-btn').forEach(b => {
    b.classList.remove('selected');
  });
  btn.classList.add('selected');
  answers[qi] = val;
  card.classList.add('answered');
  updateProgress();
}

function updateProgress() {
  const count = Object.keys(answers).length;
  const total = QUESTIONS.length;
  const pct = (count / total) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${count} / ${total}`;
  document.getElementById('answeredNum').textContent = count;
  document.getElementById('submitBtn').disabled = count < total;
}

function calcScores() {
  const dimScores = {};
  DIMENSIONS.forEach(d => { dimScores[d.id] = { total: 0, count: 0 }; });
  QUESTIONS.forEach((q, i) => {
    if (answers[i] !== undefined) {
      dimScores[q.dim].total += answers[i];
      dimScores[q.dim].count++;
    }
  });
  const result = {};
  DIMENSIONS.forEach(d => {
    const { total, count } = dimScores[d.id];
    result[d.id] = count > 0 ? Math.round((total / (count * 5)) * 100) : 0;
  });
  return result;
}

function getGrade(total) {
  if (total >= 88) return { grade:'S', label:'卓越专注型', color:'#b5860d', emoji:'🌟' };
  if (total >= 76) return { grade:'A', label:'良好专注型', color:'#0f7d65', emoji:'✅' };
  if (total >= 62) return { grade:'B', label:'发展专注型', color:'#1b5fa8', emoji:'📈' };
  if (total >= 48) return { grade:'C', label:'需要引导型', color:'#d4630a', emoji:'⚡' };
  return { grade:'D', label:'专注力待培育', color:'#c0392b', emoji:'🌱' };
}

function getProfileType(scores) {
  const sorted = Object.entries(scores).sort((a,b) => b[1]-a[1]);
  const top = sorted[0][0];
  const bottom = sorted[sorted.length-1][0];
  const types = {
    sustained: { name:'马拉松型学习者', emoji:'🏃', desc:'这类孩子一旦进入学习状态，可以保持相当长时间的专注。他们最大的优势在于能完成长篇幅的学习任务，但有时在任务初期"热身"较慢。建议在保持优势的同时，训练开篇专注效率。' },
    selective: { name:'信息筛选高手', emoji:'🔍', desc:'这类孩子天生具备从复杂信息中提取重点的能力，在嘈杂环境下依然能保持效率。非常适合课堂学习场景。可以进一步培养在安静环境下的持续专注能力。' },
    divided: { name:'多线程处理者', emoji:'🔄', desc:'这类孩子在处理多任务时表现出色，思维灵活，能同时关注多个学习元素。未来适合需要综合处理能力的学科。要注意在高强度分配时的疲劳管理。' },
    shifting: { name:'灵活切换达人', emoji:'↔️', desc:'这类孩子在科目之间切换非常顺畅，思维弹性好，不容易陷入思维定式。擅长跨学科学习。可以通过加强专项深度学习来弥补有时"浮于表面"的不足。' },
    inhibition: { name:'专注过滤器', emoji:'🛡️', desc:'这类孩子有很强的意志力来抵抗外部干扰，自我管理能力突出。在有干扰的环境中依然表现良好。重点可放在提升主动探索和学习兴趣上。' },
    motivation: { name:'内驱力引擎', emoji:'💡', desc:'这类孩子由内在兴趣和目标驱动，学习热情高涨，面对挫折能迅速恢复。是所有学习类型中最具持续发展潜力的。建议在保持内驱力的同时，强化注意力的"硬技能"。' }
  };
  return types[top] || types.sustained;
}

function showResult() {
  const scores = calcScores();
  const totalScore = Math.round(Object.values(scores).reduce((a,b)=>a+b,0) / DIMENSIONS.length);
  const grade = getGrade(totalScore);
  const profile = getProfileType(scores);

  const strengths = Object.entries(scores).filter(([,v])=>v>=70).map(([k])=>DIMENSIONS.find(d=>d.id===k)?.name);
  const weaknesses = Object.entries(scores).filter(([,v])=>v<55).map(([k])=>DIMENSIONS.find(d=>d.id===k)?.name);

  const suggestions = generateSuggestions(scores, totalScore);

  let html = `
    <div class="result-hero">
      <div style="font-size:48px; margin-bottom:8px; position:relative;">${grade.emoji}</div>
      <div class="result-grade" style="color:${grade.color}">${grade.grade}</div>
      <div class="result-label">${grade.label}</div>
      <div class="result-sub">综合专注力评分</div>
      <div class="result-score-row">
        <div class="score-stat"><strong>${totalScore}</strong><span>综合得分</span></div>
        <div class="score-stat"><strong>${strengths.length}</strong><span>优势维度</span></div>
        <div class="score-stat"><strong>${weaknesses.length}</strong><span>待提升维度</span></div>
      </div>
    </div>

    <div class="profile-type-card">
      <div class="profile-emoji">${profile.emoji}</div>
      <div>
        <h3>${profile.name}</h3>
        <p>${profile.desc}</p>
      </div>
    </div>

    <div class="report-section">
      <h3>📊 六维专注力分布 <span class="tag tag-blue">维度分析</span></h3>
      ${DIMENSIONS.map(d => {
        const score = scores[d.id];
        const bar_color = score >= 70 ? '#0f7d65' : score >= 55 ? '#1b5fa8' : score >= 40 ? '#d4630a' : '#c0392b';
        const level = score >= 70 ? '优秀' : score >= 55 ? '良好' : score >= 40 ? '一般' : '待提升';
        return `
          <div class="dim-card">
            <div class="dim-header">
              <div class="dim-name">${d.emoji} ${d.name}</div>
              <div class="dim-score-num">${score}分 · ${level}</div>
            </div>
            <div class="dim-bar-track">
              <div class="dim-bar-fill" id="bar-${d.id}" style="width:0%; background:${bar_color}"></div>
            </div>
            <div class="dim-desc">${getDimFeedback(d.id, score)}</div>
          </div>
        `;
      }).join('')}
    </div>

    <div class="report-section">
      <h3>🔬 深度行为分析 <span class="tag tag-teal">洞察报告</span></h3>
      <div class="insight-grid">
        ${generateInsights(scores, totalScore)}
      </div>
    </div>

    ${strengths.length > 0 ? `
    <div class="report-section">
      <h3>✦ 专注力优势 <span class="tag tag-teal">已表现良好</span></h3>
      <ul class="strength-list">
        ${strengths.map(s => `<li>${s}表现突出，这是孩子重要的学习资本，请继续保持并创造发挥空间</li>`).join('')}
        ${totalScore >= 70 ? '<li>整体专注力水平较高，说明孩子已具备良好的自我调控能力</li>' : ''}
      </ul>
    </div>` : ''}

    ${weaknesses.length > 0 ? `
    <div class="report-section">
      <h3>⚡ 待提升领域 <span class="tag tag-red">重点关注</span></h3>
      <ul class="strength-list">
        ${weaknesses.map(s => `<li>${s}有较大提升空间，建议优先在此方向进行针对性练习</li>`).join('')}
      </ul>
    </div>` : ''}

    <div class="report-section">
      <h3>🗺️ 个性化提升方案 <span class="tag tag-gold">行动建议</span></h3>
      ${suggestions.map(s => `
        <div class="action-card">
          <h4>${s.title}</h4>
          <p>${s.desc}</p>
        </div>
      `).join('')}
    </div>

    <div class="report-section">
      <h3>📅 30天强化计划 <span class="tag tag-blue">执行指南</span></h3>
      ${generatePlan(scores, totalScore)}
    </div>

    <div class="report-section">
      <h3>⚠️ 注意事项与说明</h3>
      <p style="font-size:13px; color:var(--ink2); line-height:1.8;">
        本报告基于家长观察填写，属于行为筛查性评估，<strong>不构成医学诊断依据</strong>。若孩子专注力问题严重影响学习和日常生活，建议咨询专业的儿童心理或发育行为医生。注意力缺陷多动障碍（ADHD）等情况需要专业评估。本测评结果仅供参考，不同评估时间、填写人可能影响结果。
      </p>
    </div>
  `;

  document.getElementById('quiz-page').style.display = 'none';
  document.getElementById('result-page').style.display = 'block';
  document.getElementById('resultContent').innerHTML = html;
  window.scrollTo(0, 0);

  setTimeout(() => {
    DIMENSIONS.forEach(d => {
      const bar = document.getElementById(`bar-${d.id}`);
      if (bar) bar.style.width = scores[d.id] + '%';
    });
  }, 300);
}

function getDimFeedback(dimId, score) {
  const feedbacks = {
    sustained: {
      high:'孩子能保持较长时间的持续专注，这是学习最核心的能力之一。在完成长篇作业时表现尤为突出，建议通过"时间块学习法"进一步强化。',
      mid:'孩子的持续注意力处于发展阶段，在完成较长任务时偶尔出现走神现象。建议采用"番茄工作法"（25分钟专注+5分钟休息）逐步延长专注时长。',
      low:'孩子目前在保持持续注意力方面存在明显挑战，建议先从5-10分钟的短任务开始，配合计时器逐步建立"专注感"，同时检查是否有睡眠不足等生理因素影响。'
    },
    selective: {
      high:'孩子具备优秀的抗干扰能力，能在复杂环境中有效筛选学习信息，这对课堂学习大有帮助。',
      mid:'孩子的选择性注意力尚在发展中，在有干扰的环境下学习效率会有所下降。建议提供相对安静的学习环境，逐步引入轻度背景音进行抗干扰训练。',
      low:'环境干扰对孩子的影响较为显著，建议暂时为孩子提供专属的安静学习空间，减少不必要的感官刺激（关掉电视、手机静音），同时训练注意力聚焦游戏如数独、找不同等。'
    },
    divided: {
      high:'孩子展现出良好的多任务处理能力，能在笔记与听讲之间切换自如，这在综合学习场景中是宝贵优势。',
      mid:'孩子处理多项任务时偶尔感到困难。建议先确保单任务专精，再逐步引入"双线任务练习"如边听有声书边画思维导图。',
      low:'同时处理多项学习任务对孩子来说目前负担较重，建议聚焦"单任务精深"模式，避免多任务并行，待基础专注力提升后再逐步扩展。'
    },
    shifting: {
      high:'孩子在科目切换时表现灵活，认知弹性好，不容易陷入思维定式，跨学科整合学习能力强。',
      mid:'孩子在任务切换时需要一定适应时间，属于正常发展范围。建议设立"过渡缓冲期"（切换科目前做3分钟整理），帮助大脑平滑转换。',
      low:'孩子在科目或任务之间切换时困难较大，可能表现为抵触或需要长时间适应。建议制定固定的学习顺序，用视觉时间表提前让孩子知道接下来的切换计划。'
    },
    inhibition: {
      high:'孩子具备较强的冲动控制能力，能有效抵抗外部诱惑和内部分心想法，自我管理能力值得表扬。',
      mid:'孩子有时会被外部刺激或内心想法带走注意力，但尚在可控范围。建议引入"先完成再奖励"的结构化学习模式，强化延迟满足能力。',
      low:'孩子在抑制干扰方面面临较大挑战，容易被手机、玩具、自身想象等占据注意力。建议建立"学习盒子"概念——学习时桌上只留必要文具，将诱惑物理隔离，配合正向强化进行训练。'
    },
    motivation: {
      high:'孩子有着强烈的内在学习动机，能将兴趣转化为持续行动力，面对挫折具有良好的心理韧性，这是最宝贵的学习品质之一。',
      mid:'孩子的内在动机处于中等水平，在感兴趣的领域表现更好。建议帮助孩子建立与学科内容的"个人联结"，发现学习的意义感，减少过度使用外部奖励。',
      low:'孩子目前主要依靠外部激励来驱动学习，内在动机有待培养。建议让孩子参与学习目标的制定，帮助建立"成长型思维"，将每次进步（而非成绩）作为奖励点，重建对学习的积极体验。'
    }
  };
  const f = feedbacks[dimId];
  if (!f) return '';
  return score >= 70 ? f.high : score >= 45 ? f.mid : f.low;
}

function generateInsights(scores, total) {
  const avg = total;
  const maxDim = Object.entries(scores).sort((a,b)=>b[1]-a[1])[0];
  const minDim = Object.entries(scores).sort((a,b)=>a[1]-b[1])[0];
  const maxDimName = DIMENSIONS.find(d=>d.id===maxDim[0])?.name;
  const minDimName = DIMENSIONS.find(d=>d.id===minDim[0])?.name;
  const variance = Math.max(...Object.values(scores)) - Math.min(...Object.values(scores));

  const items = [
    { icon:'🏆', title:'最强维度', text:`${maxDimName}（${maxDim[1]}分）是孩子的核心专注优势，充分发挥可显著提升整体学习效率。` },
    { icon:'🎯', title:'关键提升点', text:`${minDimName}（${minDim[1]}分）是当前最需要关注的维度，针对性练习效果将最为显著。` },
    { icon:'📐', title:'维度均衡度', text:`各维度得分差异为${variance}分。${variance > 30 ? '专注力分布不均衡，建议重点补强薄弱维度。' : '各维度发展较为均衡，整体专注力结构健康。'}` },
    { icon:'🧠', title:'认知负荷评估', text:`整体专注力得分${avg}分，${avg >= 70 ? '表明孩子具备较好的认知调控基础，适合更复杂的学习任务挑战。' : avg >= 50 ? '说明孩子的学习潜力良好，通过有针对性的训练可取得明显进步。' : '建议先降低日常学习任务难度，为专注力提升创造基础空间。'}` }
  ];

  return items.map(i => `
    <div class="insight-item">
      <div class="icon">${i.icon}</div>
      <h4>${i.title}</h4>
      <p>${i.text}</p>
    </div>
  `).join('');
}

function generateSuggestions(scores, total) {
  const suggestions = [];
  if (scores.sustained < 60) {
    suggestions.push({ title:'⏱ 番茄钟训练法', desc:'每天进行2-3组"番茄钟"练习：25分钟专注学习 + 5分钟完全放松。从15分钟开始，每周延长5分钟，逐步建立大脑对"持续专注"的舒适感。' });
  }
  if (scores.selective < 60) {
    suggestions.push({ title:'🔇 环境结构化设计', desc:'为孩子打造"专属学习角"：固定座位、减少视觉杂物、使用降噪耳机或白噪音。研究表明，固定的学习环境能让大脑更快进入专注状态。' });
  }
  if (scores.inhibition < 60) {
    suggestions.push({ title:'📦 诱惑隔离策略', desc:'学习前与孩子共同整理书桌，将手机、玩具放入专属盒子。使用"学习护照"记录每次完成任务，通过集章形式建立延迟满足习惯。' });
  }
  if (scores.shifting < 60) {
    suggestions.push({ title:'🗓️ 可视化学习时间表', desc:'制作彩色时间表张贴在书桌旁，标注每个科目的学习时段和休息时间。提前10分钟提醒孩子"接下来要切换了"，减少突然切换带来的抵触感。' });
  }
  if (scores.motivation < 60) {
    suggestions.push({ title:'🌟 成长日记法', desc:'每天睡前与孩子共同记录"今天学习中的1个进步"（哪怕很小）。研究显示，回顾进步能有效维持内在学习动机，形成正向循环。' });
  }
  if (total >= 70) {
    suggestions.push({ title:'🚀 挑战升级方向', desc:'孩子专注力基础良好，建议引入"深度学习"项目：选择孩子感兴趣的主题进行2-3周的持续深度研究，这将进一步锻炼高阶专注能力和元认知技能。' });
  }
  suggestions.push({ title:'😴 睡眠与运动基础', desc:'充足睡眠（6-12岁需9-11小时）和规律有氧运动（每天30-60分钟）是所有专注力提升方案的生理基础。前额叶皮质的正常工作高度依赖充足的睡眠和血氧供应。' });
  return suggestions.slice(0, 5);
}

function generatePlan(scores, total) {
  return `
    <div style="display:grid; gap:8px;">
      <div style="background:var(--surface2); border-radius:8px; padding:1rem;">
        <strong style="font-size:13px; display:block; margin-bottom:6px;">📅 第1-2周：建立基础习惯</strong>
        <p style="font-size:12px; color:var(--ink2); line-height:1.8;">
          • 设定固定学习时间（每天同一时段）<br>
          • 整理专属学习环境，移除干扰物<br>
          • 引入计时器，从15分钟专注块开始<br>
          • 建立学习前"仪式感"（如整理书包、喝水）<br>
          • 记录每天完成情况，不评价质量只奖励坚持
        </p>
      </div>
      <div style="background:var(--surface2); border-radius:8px; padding:1rem;">
        <strong style="font-size:13px; display:block; margin-bottom:6px;">📅 第3-4周：强化薄弱维度</strong>
        <p style="font-size:12px; color:var(--ink2); line-height:1.8;">
          • ${scores.sustained < 60 ? '每天延长专注时长5分钟，目标达到25分钟' : '尝试挑战40分钟深度专注块'}<br>
          • ${scores.inhibition < 60 ? '练习"先完成、再娱乐"的自我约定' : '引入轻度挑战任务测试极限专注'}<br>
          • 引入"专注力小游戏"（舒尔特表、大家来找茬）<br>
          • 每周与孩子回顾进步，调整下周目标<br>
          • 保证每天30分钟户外运动促进神经系统发育
        </p>
      </div>
      <div style="background:var(--teal-soft); border:1px solid rgba(15,125,101,0.15); border-radius:8px; padding:1rem;">
        <strong style="font-size:13px; display:block; margin-bottom:6px; color:var(--teal);">🎯 30天后评估建议</strong>
        <p style="font-size:12px; color:var(--ink2); line-height:1.8;">
          30天后重新完成本测评，观察各维度变化。重点关注孩子在学校的反馈（老师评价、作业完成质量），这是专注力提升的最真实验证。若提升不明显，建议咨询专业人士。
        </p>
      </div>
    </div>
  `;
}

function restart() {
  Object.keys(answers).forEach(k => delete answers[k]);
  document.getElementById('quiz-page').style.display = 'block';
  document.getElementById('result-page').style.display = 'none';
  document.querySelectorAll('.option-btn, .freq-btn').forEach(b => b.classList.remove('selected'));
  document.querySelectorAll('.question-card').forEach(c => c.classList.remove('answered'));
  updateProgress();
  window.scrollTo(0, 0);
}

buildQuiz();
updateProgress();
</script>
